# 本地或单机部署：前后端 + 数据持久化
version: "3"
services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  backend-data:
